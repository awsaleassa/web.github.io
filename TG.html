<!doctype html>
<html lang="en">
  <head>
    <title>Task Manager</title>
    <style>
      
      body {
        background: linear-gradient(to right, blue, skyblue);
      }

      fieldset {
        border: white 3px solid;
        color: white;
        font-size: large;
        font-family:
          "Lucida Sans", "Lucida Sans Regular", "Lucida Grande",
          "Lucida Sans Unicode", Geneva, Verdana, sans-serif;
        font-weight: bold;
        border-radius: 30px;
      }

      legend {
        color: white;
        font-size: 25px;
        font-weight: bold;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        text-align: center;
      }

      input[type="button"] {
        color: black;
        height: 32px;
        width: 60px;
        text-align: center;
        font-size: 15px;
        background-color: white;
        border-radius: 12%;
        font-weight: bold;
      }

      input[type="reset"] {
        color: black;
        font-weight: bold;
        height: 32px;
        width: 60px;
        text-align: center;
        font-size: 15px;
        background-color: white;
        border-radius: 12%;
      }

      input[type="text"] {
        width: 1150px;
        height: 27px;
        font-size: 15px;
        background-color: white;
        color: rgb(0, 0, 0);
        border-radius: 30px;
        font-family: "Franklin Gothic Medium", "Arial Narrow", Arial, sans-serif;
        text-align: center;
        font-size: larger;
      }

      input[type="checkbox"] {
        height: 20px;
        width: 30px;
        border-radius: 50%;
        accent-color: white;
        margin: 10px;
      }


    </style>

    <script>

      function button() {
        var html = "<br>";
        html += "<input type='text'>";
        html += "<input type='checkbox'>";
        document.getElementById("fieldset").insertAdjacentHTML("beforeend", html);
      }

    </script>
  </head>
  <body>
    <div>
      <center>
        <form>

          <fieldset id="fieldset">
            <legend>Daily Tasks :&nbsp;</legend>
            <input type="button" id="add" value="➕" onclick="button()"> <input type="reset" value="🔄"> <br>
          </fieldset>

          <fieldset>
            <legend>Home Works :&nbsp;</legend>
            <input type="text">
          </fieldset>

        </form>
        </center>
    </div>
  </body>
</html>
